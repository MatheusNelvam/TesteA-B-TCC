name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Altere para o caminho absoluto da pasta do projeto na sua VPS
            cd /var/www/TesteA-B-TCC || cd ~/TesteA-B-TCC || cd /app
            
            # Puxa as alterações mais recentes da branch main
            git pull origin main
            
            # Reconstrói e reinicia os containers do Docker
            docker compose down
            docker compose up -d --build
