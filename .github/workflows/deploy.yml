name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar se os Segredos estão carregados
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "ERRO: VPS_HOST está vazio no GitHub!"; exit 1; fi
          if [ -z "${{ secrets.VPS_USERNAME }}" ]; then echo "ERRO: VPS_USERNAME está vazio no GitHub!"; exit 1; fi
          if [ -z "${{ secrets.VPS_PASSWORD }}" ]; then echo "ERRO: VPS_PASSWORD está vazio no GitHub!"; exit 1; fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            # Altere para o caminho absoluto da pasta do projeto na sua VPS
            cd /var/www/TesteA-B-TCC || cd ~/TesteA-B-TCC || { echo "ERRO: Pasta do projeto não encontrada na VPS!"; exit 1; }
            
            # Evita conflito com o banco de dados db.sqlite3 (que está rastreado no Git)
            # Salvamos o banco de dados da VPS temporariamente, resetamos o arquivo rastreado para o pull passar, e depois restauramos.
            if [ -f db.sqlite3 ]; then
              echo "Fazendo backup temporário do banco de dados da VPS..."
              cp db.sqlite3 /tmp/db.sqlite3.bak
              git checkout db.sqlite3
            fi
            
            # Puxa as alterações mais recentes da branch main
            git pull origin main
            
            if [ -f /tmp/db.sqlite3.bak ]; then
              echo "Restaurando o banco de dados da VPS..."
              mv /tmp/db.sqlite3.bak db.sqlite3
            fi
            
            # Detecta se o comando correto é 'docker compose' ou 'docker-compose'
            if docker compose version >/dev/null 2>&1; then
              DOCKER_CMD="docker compose"
            else
              DOCKER_CMD="docker-compose"
            fi
            
            # Reconstrói e reinicia os containers do Docker
            $DOCKER_CMD down
            $DOCKER_CMD up -d --build
