<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário de Avaliação - Experimento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        header h1 {
            font-size: 1.1rem;
            color: #0f172a;
            font-weight: 700;
        }
        .btn-exit {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-exit:hover {
            background-color: #cbd5e1;
            color: #0f172a;
        }
        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Questionário do Experimento (Teste A/B)</h1>
        <a href="{% url 'selecao' %}" class="btn-exit">Voltar à Seleção</a>
    </header>
    <div class="iframe-container">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd925D6mnKW-33oZGBRj2ugh7RCy1-2y3cszf6nnPAxGaskTw/viewform" title="Google Forms Survey">
            Carregando...
        </iframe>
    </div>
</body>
</html>
